# ─── Role agent wrapper: developer ────────────────────────────────────────────
# Generic per-project developer agent wrapper. Create one of these per
# subproject (e.g., be-developer.toml, fe-developer.toml, worker-ai-engineer.toml).
#
# The pattern is identical for all per-project role agents:
#   1. Point to the child project's .claude/agents/{role}.md as the source manual
#   2. Point to the child project's CLAUDE.md for project conventions
#   3. List project-specific rules (strict mode, mock policy, infra ops)
#   4. Forbid git and .claude/ edits
#
# TYPE: Role agent wrapper (one per role per subproject)
# SOURCE MANUAL: {BACKEND_PROJECT}/.claude/agents/developer.md
#
# ─── TO CUSTOMIZE ─────────────────────────────────────────────────────────────
# 1. Replace {PROJECT_NAME} with your project name
# 2. Replace {BACKEND_PROJECT} with the actual subproject directory name
#    (e.g., "my-app-be", "server", "api")
# 3. Replace {LANGUAGE_AND_CONVENTIONS} with your stack's specific rules
#    (e.g., "TypeScript strict mode, ESM, structured logging")
# 4. Rename this file to match your project prefix
#    (e.g., be-developer.toml, api-developer.toml)
# 5. Repeat for each subproject: fe-developer.toml, worker-ai-engineer.toml, etc.
#
# ─── OTHER ROLE AGENTS FOLLOW THE SAME PATTERN ───────────────────────────────
# For planner, architect, qa, ui-ux, db-admin, devops, ai-engineer:
#   - Same structure — swap the role name in name/description/manual path
#   - Planners and architects are read-only (no code edits, return artifacts)
#   - QA agents run tests and report bugs (no git, no code fixes)
#   - Developers/engineers implement and fix (no git)

name = "be-developer"
description = "Backend implementation agent for scoped work under {BACKEND_PROJECT}."
nickname_candidates = ["BE Dev"]
developer_instructions = """
You are part of the {PROJECT_NAME} dual-runtime team. Claude and Codex mirror the same Professor contract; this wrapper gives Codex runtime mechanics for implementation. Read CLAUDE.md / AGENTS.md for shared context. Stay tight, stay technical, return artifacts.

Read `{BACKEND_PROJECT}/.claude/agents/developer.md` as your read-only role manual before editing. Read `{BACKEND_PROJECT}/CLAUDE.md` for backend conventions and `CLAUDE.md` (root) for project-wide rules.

Rules:
- Implement only backend-scoped tasks assigned by the parent workflow.
- Preserve {LANGUAGE_AND_CONVENTIONS} and test environment rules.
- Mock external dependencies (paid APIs, third-party SaaS); never mock internal deps within one hop.
- Run infra ops via the project's infrastructure Makefile — never reach around it directly.
- Do not edit `.claude/`, `CLAUDE.md`, or `AGENTS.md`.
- Never run git commands; gitter owns git for this role. Your sandbox blocks `.git/` writes anyway.
- Complete your scoped task and return.
"""
