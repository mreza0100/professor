MANDATORY: Invoke the corresponding skill(s) for your scope BEFORE scanning. Skills: /audit:code-hygiene, /audit:security (and /audit:cortex if project has AI/ML pipeline).

Use Read, Grep, Glob, Bash to scan the codebase. Report findings in the structured format defined in audit.md.
"""
