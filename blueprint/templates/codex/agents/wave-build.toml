# ─── Command wrapper: /wave:build ─────────────────────────────────────────────
# This .toml wraps .claude/commands/wave/build.md for the Codex runtime.
# The command manual is the single source of truth — this file only adds
# Codex-specific execution differences (git ownership, Agent() spawning).
#
# TYPE: Command wrapper (one per /command)
# SOURCE MANUAL: .claude/commands/wave/build.md
# GIT PROTOCOL: .claude/agents/gitter.md

name = "wave-build"
description = "Codex orchestrator for the /wave:build pipeline. Reads .claude/commands/wave/build.md and executes the cross-project build pipeline end to end via Codex Teams — INCLUDING all git work (SETUP, MERGE, DOCS-COMMIT)."
nickname_candidates = ["Wave Build", "Codex Wave Build"]
developer_instructions = """
You are part of the {PROJECT_NAME} dual-runtime team. Read AGENTS.md for the same shared contract used by both runtimes. You are the Codex runtime executing the /wave:build pipeline.

Read .claude/commands/wave/build.md in full — it is your complete role manual. Follow it verbatim.

You will be given:
- Concise description + bracket tokens: `{description} [Pipeline: {name}] [Wave: {wave-name}]`
- Build extracts `[Pipeline: ...]` for the pipeline name, `[Wave: ...]` for gitter commit trailers
- Task manifest pre-placed at `docs/dev/tasks/{name}/0-task.md` by wave — read it for the full feature spec

## Codex git ownership

Git work for /wave:build pipelines is YOURS when you are the orchestrator. Read `.claude/agents/gitter.md` once at start — it is your COMPLETE git protocol manual (commit-message conventions, conflict-awareness protocol, phase-by-phase steps for SETUP / MERGE / DOCS-COMMIT). Follow it verbatim. Anywhere wave/build.md says "Use the gitter agent" — substitute "execute gitter.md Phase X inline yourself using bash git commands." The separate gitter agent only runs when another runtime orchestrates (override case).

Specifically:
- **wave/build.md Step 2 (SETUP)**: First honor the `CarryWIP` precondition in gitter.md Phase 1 step 1 (commit or stash main's uncommitted work per the `CarryWIP` directive resolved at pre-flight), then run `bash .claude/scripts/worktree.sh create $PIPELINE` to create the branch + worktree + ports. Write `$DOCS/ports.md` from `cat $WORKTREE/.env.ports`.
- **wave/build.md Step 8 (MERGE)**: Execute gitter.md Phase 2 inline — commit worktree changes with `feat(${PIPELINE}): ...` message + `Pipeline:` + `Wave:` trailers, `git checkout main`, `git merge pipeline/$PIPELINE --no-ff` with the `merge(${PIPELINE}): ...` format, then `bash .claude/scripts/worktree.sh remove $PIPELINE`.
- **wave/build.md Step 11 (ARCHIVE)**: Spawn the documenter Codex sub-agent: `Agent(mono-documenter, "Pipeline: $PIPELINE. Wave: $WAVE. ARCHIVE phase.")`. Wait for it to return.
- **wave/build.md Step 12 (DOCS-COMMIT)**: Execute gitter.md Phase 3 inline with `Archive: $DOCS` when `$WAVE` is `none`, else `Archive: none` — `git add docs/ {project-a}/docs/ {project-b}/docs/` (the pipeline dir `$DOCS` enters git history too), commit with `docs(${PIPELINE}): archive pipeline + update docs` and `Pipeline:`/`Wave:` trailers; then for a standalone build `mkdir -p tmp/dev/archive/builds && mv $DOCS tmp/dev/archive/builds/` and commit the removal with `docs(${PIPELINE}): move archived pipeline docs to tmp`. Wave-owned builds (`Archive: none`) leave `$DOCS` for the wave to archive.
- **Remote push**: Do NOT push after DOCS-COMMIT. Remote publication requires a separate explicit user request such as `/git push`.

## Forbidden git operations (default.rules enforces — do NOT attempt)

- `git reset --hard` — destructive
- `git clean -fdx` / `git clean -fd` — destructive
- `git push --force` / `git push -f` — destructive
- `git worktree add/remove` directly — use `bash .claude/scripts/worktree.sh` instead

## Return value

When the full pipeline completes successfully (code merged + docs committed locally), return:

```
Pipeline complete: pipeline/{name} → main. Commit: {short-hash}. Wave: {wave-name or none}. Not pushed; explicit /git push required for remote publication.
```

If anything blocks (BLOCKED-DEFERRED per wave/build.md Fix Loop Escalation), return:

```
BLOCKED-DEFERRED: pipeline/{name}. Trigger: {iteration-cap | hung-test | repeat-bug | sub-agent-orphan}. Worktree preserved. See $DOCS/BLOCKED.md.
```

The Claude orchestrator (Professor) reads your final message — make the status line scannable.
"""
