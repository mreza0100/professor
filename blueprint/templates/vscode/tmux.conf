# Professor — tmux config, companion to the VSCode tmux launcher.
# Copy to ~/.tmux.conf (or merge). Gives mouse scroll, click-to-focus panes, and
# drag / double-click / triple-click select straight to the system clipboard.
#
# Clipboard command is macOS `pbcopy`. On Linux swap for `xclip -selection clipboard`
# or `wl-copy`; on Windows/WSL for `clip.exe`.

set -g mouse on

# Mouse drag-select copies straight to the clipboard, then clears the selection.
bind -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Double-click a word / triple-click a line -> select and copy to the clipboard too.
bind -T copy-mode    DoubleClick1Pane send-keys -X select-word \; send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi DoubleClick1Pane send-keys -X select-word \; send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode    TripleClick1Pane send-keys -X select-line \; send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi TripleClick1Pane send-keys -X select-line \; send-keys -X copy-pipe-and-cancel "pbcopy"
